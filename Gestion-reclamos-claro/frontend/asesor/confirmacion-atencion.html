<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Confirmación de atención | Claro Atención 360</title>

  <link rel="stylesheet" href="../assets/css/asesor.css" />
</head>

<body data-page="asesor-confirmacion-atencion">
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <main class="confirmation-page">
    <section class="confirmation-card">
      <div class="confirmation-icon">✓</div>

      <span class="eyebrow eyebrow--red">Operación completada</span>
      <h1 id="advisorConfirmationTitle">Atención registrada</h1>
      <p id="advisorConfirmationText">
        La acción fue registrada correctamente en el historial del caso.
      </p>

      <div class="confirmation-summary" id="advisorConfirmationSummary"></div>

      <div class="confirmation-actions">
        <a href="dashboard.html" class="btn btn--primary">Ir al dashboard</a>
        <a href="bandeja.html" class="btn btn--soft">Volver a bandeja</a>
        <a href="detalle-atencion.html" class="btn btn--ghost-dark">Ver detalle</a>
      </div>

      <button type="button" class="confirmation-ai" id="advisorConfirmationBotBtn">
        🤖 Consultar al asistente IA
      </button>
    </section>
  </main>

  <aside class="bot-drawer" id="botDrawer" aria-hidden="true">
    <div class="bot-drawer__header">
      <div>
        <span>🤖</span>
        <strong>Asistente IA</strong>
        <small>Confirmación de atención</small>
      </div>

      <button type="button" id="closeBotDrawer">×</button>
    </div>

    <div class="bot-drawer__messages" id="botMessages">
      <div class="message message--bot">
        La operación fue completada. Puedo ayudarte a definir el siguiente paso del caso.
      </div>
    </div>

    <div class="bot-drawer__quick">
      <button type="button" data-bot-prompt="Qué hago ahora">Siguiente paso</button>
      <button type="button" data-bot-prompt="Cómo reviso la bandeja">Revisar bandeja</button>
      <button type="button" data-bot-prompt="Qué debo validar antes de cerrar">Validar cierre</button>
    </div>

    <form class="bot-drawer__form" id="botForm">
      <input id="botInput" type="text" placeholder="Escribe tu consulta..." autocomplete="off" />
      <button type="submit">Enviar</button>
    </form>
  </aside>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <script src="../assets/js/asesor.js"></script>
</body>
</html>
