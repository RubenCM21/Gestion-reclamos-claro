services:
  postgres:
    image: postgres:16
    container_name: gestion_reclamos_db
    environment:
      POSTGRES_DB: gestion_reclamos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gestion_reclamos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
